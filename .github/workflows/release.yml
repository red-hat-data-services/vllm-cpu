name: release
run-name: Release ${{ github.event_name == 'push' && github.ref_name || inputs.tag }} - ${{ github.actor }}

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.9.0)"
        type: string
        required: true

jobs:
  trigger-release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag and SHA
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.ref_name }}"
            SHA="${{ github.sha }}"
          else
            TAG="${{ inputs.tag }}"
            SHA=$(gh api "repos/${{ github.repository }}/commits/refs/tags/$TAG" --jq '.sha')
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Trigger nm-cicd release workflow
        run: |
          gh workflow run release.yml \
            --repo neuralmagic/nm-cicd \
            --ref main \
            -f repo=${{ github.repository }} \
            -f tag=${{ steps.resolve.outputs.tag }} \
            -f sha=${{ steps.resolve.outputs.sha }}
        env:
          GH_TOKEN: ${{ secrets.CICD_GITHUB_PAT }}
